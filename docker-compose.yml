version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-okakchat}
      POSTGRES_USER: ${POSTGRES_USER:-okak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okak}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-okakchat}
      POSTGRES_USER: ${POSTGRES_USER:-okak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      MAIL_SERVICE_BASE_URL: ${MAIL_SERVICE_BASE_URL}
      MAIL_SERVICE_TOKEN: ${MAIL_SERVICE_TOKEN}
      MAIL_SITE_URL: ${MAIL_SITE_URL:-https://okak.club}

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-okakchat}
      POSTGRES_USER: ${POSTGRES_USER:-okak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  ai-proxy:
    build:
      context: .
      dockerfile: ai-proxy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-okakchat}
      POSTGRES_USER: ${POSTGRES_USER:-okak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY_ENCRYPTION_SECRET: ${AI_API_KEY_ENCRYPTION_SECRET}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - auth-service
      - chat-service
      - ai-proxy
    # No host port binding — Traefik routes to this container via labels
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.okakchat.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.okakchat.entrypoints=websecure"
      - "traefik.http.routers.okakchat.tls.certresolver=letsencrypt"
      - "traefik.http.services.okakchat.loadbalancer.server.port=80"
      # WebSocket support
      - "traefik.http.middlewares.okakchat-ws.headers.customrequestheaders.X-Forwarded-Proto=https"

volumes:
  pgdata:

name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: auth-service
          push: true
          tags: ghcr.io/mint1524/okakchat-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push chat-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: chat-service
          push: true
          tags: ghcr.io/mint1524/okakchat-chat:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai-proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ai-proxy
          push: true
          tags: ghcr.io/mint1524/okakchat-aiproxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/mint1524/okakchat-auth:latest
            docker pull ghcr.io/mint1524/okakchat-chat:latest
            docker pull ghcr.io/mint1524/okakchat-aiproxy:latest
            cd /etc/dokploy/compose/okakneprod-chatback-szkz0w/code
            sudo docker compose up -d --no-build
            sleep 5
            docker exec okakneprod-chatback-szkz0w-nginx-1 nginx -s reload
